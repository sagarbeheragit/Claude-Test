<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="noise-overlay"></div>
    <div class="grid-overlay"></div>

    <div class="container">
        <div class="title-wrapper">
            <h1>
                <span class="title-glow">TIC TAC TOE</span>
                <span class="title-subtitle">ARCADE EDITION</span>
            </h1>
        </div>

        <div class="scoreboard">
            <div class="score player-x-score active-glow">
                <div class="score-icon">❌</div>
                <span class="player-label">PLAYER X</span>
                <span class="score-value" id="score-x">0</span>
                <div class="score-glow"></div>
            </div>
            <div class="score-divider">VS</div>
            <div class="score player-o-score">
                <div class="score-icon">⭕</div>
                <span class="player-label">PLAYER O</span>
                <span class="score-value" id="score-o">0</span>
                <div class="score-glow"></div>
            </div>
        </div>

        <div class="draws-display">
            <span class="draws-label">🤝 DRAWS</span>
            <span class="draws-value" id="score-draw">0</span>
        </div>

        <div class="game-mode">
            <span class="mode-label">SELECT MODE</span>
            <div class="mode-toggle">
                <div class="toggle-track">
                    <div class="toggle-indicator"></div>
                    <div class="toggle-options">
                        <label class="toggle-option active">
                            <input type="radio" name="game-mode" value="human" checked>
                            <span>👤 VS 👤</span>
                        </label>
                        <label class="toggle-option">
                            <input type="radio" name="game-mode" value="computer">
                            <span>👤 VS 🤖</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="difficulty-selector" id="difficulty-selector" style="display: none;">
            <span class="difficulty-label">LEVEL:</span>
            <div class="difficulty-buttons">
                <button class="difficulty-btn" data-level="easy">Easy</button>
                <button class="difficulty-btn active" data-level="medium">Medium</button>
                <button class="difficulty-btn" data-level="difficult">Difficult</button>
                <button class="difficulty-btn" data-level="impossible">Impossible</button>
            </div>
        </div>

        <div class="game-wrapper">
            <div id="status" class="status">
                <span class="status-icon">🎮</span>
                <span class="status-text">PLAYER X'S TURN</span>
            </div>

            <div class="board-container">
                <div class="board-glow"></div>
                <div id="game-board" class="board">
                    <div class="cell" data-index="0"></div>
                    <div class="cell" data-index="1"></div>
                    <div class="cell" data-index="2"></div>
                    <div class="cell" data-index="3"></div>
                    <div class="cell" data-index="4"></div>
                    <div class="cell" data-index="5"></div>
                    <div class="cell" data-index="6"></div>
                    <div class="cell" data-index="7"></div>
                    <div class="cell" data-index="8"></div>
                </div>
                <div class="board-corners">
                    <div class="corner top-left"></div>
                    <div class="corner top-right"></div>
                    <div class="corner bottom-left"></div>
                    <div class="corner bottom-right"></div>
                </div>
            </div>
        </div>

        <button id="restart-button">
            <span class="btn-icon">🔄</span>
            <span class="btn-text">NEW GAME</span>
            <div class="btn-glow"></div>
        </button>

        <div class="turn-indicator">
            <div class="turn-dot x-dot"></div>
            <div class="turn-dot o-dot"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
