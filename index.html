<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        <div class="scoreboard">
            <div class="score player-x-score">
                <span class="player-label">Player X</span>
                <span class="score-value" id="score-x">0</span>
            </div>
            <div class="score draws">
                <span class="player-label">Draws</span>
                <span class="score-value" id="score-draw">0</span>
            </div>
            <div class="score player-o-score">
                <span class="player-label">Player O</span>
                <span class="score-value" id="score-o">0</span>
            </div>
        </div>
        <div class="game-mode">
            <span class="mode-label">Game Mode:</span>
            <div class="mode-buttons">
                <button class="mode-btn active" data-mode="human">
                    <span>👤</span> vs <span>👤</span>
                </button>
                <button class="mode-btn" data-mode="computer">
                    <span>👤</span> vs <span>🤖</span>
                </button>
            </div>
        </div>
        <div class="game-wrapper">
            <div id="status" class="status">
                <span class="status-icon">🎮</span>
                <span class="status-text">Player X's turn</span>
            </div>
            <div id="game-board" class="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
        </div>
        <button id="restart-button">
            <span class="btn-icon">🔄</span>
            <span class="btn-text">New Game</span>
        </button>
    </div>
    <script src="script.js"></script>
</body>
</html>
